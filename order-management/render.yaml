services:
  - type: web
    name: order-management-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: SCHEDULER_SECRET_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ENABLE_INTERNAL_CRON
        value: "true"

  - type: web
    name: order-management-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
